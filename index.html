  <script>(()=>{function filter(e){let m=e&&(typeof e==='string'?e:e.message);if(m&&/asynchronous response|message channel|channel closed|listener indicated/i.test(m))return true}addEventListener('error',function(e){try{if(filter(e.message)){e.preventDefault();e.stopImmediatePropagation()}}catch(e){}});addEventListener('unhandledrejection',function(e){try{if(filter(e.reason))e.preventDefault()}catch(e){}});let orig=console.error;console.error=function(){let m=[].slice.call(arguments).map(a=>String(a)).join(' ');if(/asynchronous response|message channel|channel closed|listener indicated/i.test(m))return;return orig.apply(this,arguments)}})()</script>
